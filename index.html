<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hóa học 12 – Đại cương về kim loại - Học sinh Trần Minh Triển 12A1</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            position: relative;
        }
        #title {
            font-size: 24px;
            margin-bottom: 20px;
        }
        #start-screen, #quiz-screen, #result-screen {
            display: none;
        }
        #start-screen.active, #quiz-screen.active, #result-screen.active {
            display: block;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            margin: 10px;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        #question {
            font-size: 20px;
            margin: 20px 0;
        }
        .option {
            background-color: #333;
            padding: 10px;
            margin: 10px 0;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
        }
        .option.selected {
            background-color: #2196F3;
        }
        .correct {
            background-color: #4CAF50 !important;
        }
        .incorrect {
            background-color: #f44336 !important;
        }
        #status {
            font-size: 16px;
            margin-top: 10px;
        }
        #score {
            font-size: 18px;
            margin: 10px 0;
        }
        #video {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 200px;
            height: 150px;
            border: 2px solid #fff;
            border-radius: 5px;
        }
        @media (max-width: 600px) {
            #title {
                font-size: 18px;
            }
            #question {
                font-size: 16px;
            }
            .option {
                font-size: 14px;
            }
            #video {
                width: 150px;
                height: 112px;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <h1 id="title">Game Hóa học 12 – Đại cương về kim loại<br>Học sinh Trần Minh Triển 12A1</h1>
        <div id="start-screen" class="active">
            <button id="start-btn">Bắt đầu chơi</button>
        </div>
        <div id="quiz-screen">
            <div id="progress">Câu hỏi: <span id="current-question">1</span>/30</div>
            <div id="score">Điểm: <span id="current-score">0</span></div>
            <div id="question"></div>
            <div id="options">
                <div class="option" id="A">A</div>
                <div class="option" id="B">B</div>
                <div class="option" id="C">C</div>
                <div class="option" id="D">D</div>
            </div>
            <div id="status">Đang nhận diện khuôn mặt...</div>
        </div>
        <div id="result-screen">
            <h2>Kết quả</h2>
            <p>Bạn trả lời đúng: <span id="final-score">0</span>/30 câu</p>
            <button id="restart-btn">Chơi lại</button>
        </div>
        <video id="video" autoplay playsinline></video>
    </div>

    <script>
        const questions = [
            {
                question: "Kim loại nào sau đây phản ứng mạnh với nước ở nhiệt độ thường?",
                options: ["A. Fe", "B. Na", "C. Cu", "D. Ag"],
                answer: "B"
            },
            {
                question: "Liên kết kim loại là loại liên kết gì?",
                options: ["A. Liên kết ion", "B. Liên kết cộng hóa trị", "C. Liên kết kim loại", "D. Liên kết hydro"],
                answer: "C"
            },
            {
                question: "Trong dãy điện hóa kim loại, kim loại nào có tính khử mạnh nhất?",
                options: ["A. Au", "B. Ag", "C. K", "D. Cu"],
                answer: "C"
            },
            {
                question: "Tính chất hóa học đặc trưng của kim loại là gì?",
                options: ["A. Tính oxi hóa", "B. Tính khử", "C. Tính axit", "D. Tính bazơ"],
                answer: "B"
            },
            {
                question: "Ăn mòn kim loại là quá trình gì?",
                options: ["A. Oxit hóa kim loại", "B. Khử kim loại", "C. Phân hủy kim loại", "D. Hợp nhất kim loại"],
                answer: "A"
            },
            {
                question: "Phương pháp điều chế kim loại phổ biến là gì?",
                options: ["A. Nhiệt phân", "B. Điện phân", "C. Thủy phân", "D. Axit hóa"],
                answer: "B"
            },
            {
                question: "Kim loại nào không phản ứng với axit HCl?",
                options: ["A. Fe", "B. Cu", "C. Zn", "D. Mg"],
                answer: "B"
            },
            {
                question: "Đặc điểm chung của kim loại là gì?",
                options: ["A. Dẫn điện kém", "B. Dẫn điện tốt", "C. Không dẻo", "D. Không dẫn nhiệt"],
                answer: "B"
            },
            {
                question: "Dãy điện hóa kim loại sắp xếp theo thứ tự nào?",
                options: ["A. Tăng tính khử", "B. Giảm tính khử", "C. Tăng tính oxi hóa", "D. Giảm tính oxi hóa"],
                answer: "B"
            },
            {
                question: "Kim loại phản ứng với nước tạo bazơ là?",
                options: ["A. Na", "B. Fe", "C. Cu", "D. Ag"],
                answer: "A"
            },
            {
                question: "Ăn mòn điện hóa xảy ra khi nào?",
                options: ["A. Kim loại tiếp xúc với không khí", "B. Kim loại tiếp xúc với nước", "C. Có sự chênh lệch điện thế", "D. Tất cả"],
                answer: "C"
            },
            {
                question: "Điều chế Al bằng phương pháp nào?",
                options: ["A. Nhiệt luyện", "B. Điện phân", "C. Khử bằng C", "D. Thủy luyện"],
                answer: "B"
            },
            {
                question: "Kim loại nào có tính dẻo cao nhất?",
                options: ["A. Fe", "B. Au", "C. Al", "D. Cu"],
                answer: "B"
            },
            {
                question: "Liên kết kim loại hình thành do?",
                options: ["A. Electron tự do", "B. Ion dương", "C. Electron chia sẻ", "D. Proton"],
                answer: "A"
            },
            {
                question: "Trong dãy điện hóa, vị trí của Fe ở đâu so với Zn?",
                options: ["A. Trước", "B. Sau", "C. Bằng", "D. Không so sánh"],
                answer: "B"
            },
            {
                question: "Tính chất hóa học của kim loại với oxi là?",
                options: ["A. Không phản ứng", "B. Tạo oxit", "C. Tạo axit", "D. Tạo bazơ"],
                answer: "B"
            },
            {
                question: "Ăn mòn kim loại có thể ngăn chặn bằng cách nào?",
                options: ["A. Sơn phủ", "B. Mạ kim loại", "C. Cả A và B", "D. Không thể"],
                answer: "C"
            },
            {
                question: "Điều chế Fe từ quặng bằng phương pháp nào?",
                options: ["A. Điện phân", "B. Nhiệt luyện với C", "C. Thủy phân", "D. Axit hóa"],
                answer: "B"
            },
            {
                question: "Kim loại nào là kim loại kiềm?",
                options: ["A. Fe", "B. Na", "C. Cu", "D. Zn"],
                answer: "B"
            },
            {
                question: "Đặc điểm của liên kết kim loại là?",
                options: ["A. Hướng tính", "B. Không hướng tính", "C. Bão hòa", "D. Không bão hòa"],
                answer: "B"
            },
            {
                question: "Dãy điện hóa dùng để dự đoán phản ứng gì?",
                options: ["A. Khử", "B. Oxi hóa", "C. Thế kim loại", "D. Tất cả"],
                answer: "C"
            },
            {
                question: "Kim loại phản ứng với axit loãng giải phóng H2 là?",
                options: ["A. Cu", "B. Ag", "C. Zn", "D. Au"],
                answer: "C"
            },
            {
                question: "Ăn mòn hóa học là gì?",
                options: ["A. Phản ứng với oxi khô", "B. Phản ứng với nước", "C. Điện hóa", "D. Sinh học"],
                answer: "A"
            },
            {
                question: "Điều chế kim loại quý bằng phương pháp nào?",
                options: ["A. Thủy luyện", "B. Nhiệt luyện", "C. Điện phân", "D. Khử hóa học"],
                answer: "A"
            },
            {
                question: "Kim loại nào có nhiệt độ nóng chảy thấp?",
                options: ["A. W", "B. Hg", "C. Fe", "D. Cu"],
                answer: "B"
            },
            {
                question: "Mô hình liên kết kim loại là?",
                options: ["A. Biển electron", "B. Mạng tinh thể", "C. Cả A và B", "D. Không có"],
                answer: "C"
            },
            {
                question: "Trong dãy điện hóa, kim loại nào đứng sau H?",
                options: ["A. K", "B. Na", "C. Cu", "D. Mg"],
                answer: "C"
            },
            {
                question: "Tính chất của kim loại với halogen là?",
                options: ["A. Không phản ứng", "B. Tạo halogenua", "C. Tạo oxit", "D. Tạo axit"],
                answer: "B"
            },
            {
                question: "Biện pháp chống ăn mòn cho sắt là?",
                options: ["A. Mạ kẽm", "B. Sơn", "C. Cả A và B", "D. Không cần"],
                answer: "C"
            },
            {
                question: "Điều chế Na bằng phương pháp nào?",
                options: ["A. Nhiệt luyện", "B. Điện phân dung dịch", "C. Điện phân nóng chảy", "D. Khử bằng C"],
                answer: "C"
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let selectedOption = null;
        let video;
        let modelsLoaded = false;
        let faceDetectionInterval;

        async function loadModels() {
            await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/models');
            await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/models');
            modelsLoaded = true;
        }

        async function startVideo() {
            video = document.getElementById('video');
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => {
                    video.srcObject = stream;
                })
                .catch(err => console.error(err));
        }

        function startDetection() {
            faceDetectionInterval = setInterval(async () => {
                if (modelsLoaded && video.videoWidth > 0) {
                    const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
                    if (detections.length > 0) {
                        const landmarks = detections[0].landmarks;
                        const headPose = faceapi.utils.estimateHeadPose(landmarks.positions);
                        if (headPose) {
                            const yaw = headPose.rotation.yaw * (180 / Math.PI); // Convert to degrees
                            updateSelection(yaw);
                        }
                    } else {
                        document.getElementById('status').innerText = 'Đang nhận diện khuôn mặt...';
                        clearSelection();
                    }
                }
            }, 500); // Check every 500ms
        }

        function updateSelection(yaw) {
            clearSelection();
            let status = '';
            if (yaw < -30) {
                selectOption('A');
                status = 'Nghiêng trái (A)';
            } else if (yaw >= -30 && yaw < -10) {
                selectOption('B');
                status = 'Nghiêng hơi trái (B)';
            } else if (yaw > 10 && yaw <= 30) {
                selectOption('C');
                status = 'Nghiêng hơi phải (C)';
            } else if (yaw > 30) {
                selectOption('D');
                status = 'Nghiêng phải (D)';
            } else {
                status = 'Giữ đầu thẳng';
            }
            document.getElementById('status').innerText = status;
        }

        function selectOption(option) {
            selectedOption = option;
            document.getElementById(option).classList.add('selected');
        }

        function clearSelection() {
            selectedOption = null;
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
        }

        function checkAnswer() {
            if (selectedOption) {
                const correct = questions[currentQuestion].answer;
                if (selectedOption === correct) {
                    score++;
                    document.getElementById(selectedOption).classList.add('correct');
                } else {
                    document.getElementById(selectedOption).classList.add('incorrect');
                    document.getElementById(correct).classList.add('correct');
                }
                document.getElementById('current-score').innerText = score;
                setTimeout(nextQuestion, 2000);
            }
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function loadQuestion() {
            clearSelection();
            document.getElementById('current-question').innerText = currentQuestion + 1;
            document.getElementById('question').innerText = questions[currentQuestion].question;
            const opts = questions[currentQuestion].options;
            for (let i = 0; i < 4; i++) {
                document.getElementById(String.fromCharCode(65 + i)).innerText = opts[i];
                document.getElementById(String.fromCharCode(65 + i)).classList.remove('correct', 'incorrect');
            }
        }

        function showResult() {
            clearInterval(faceDetectionInterval);
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            document.getElementById('final-score').innerText = score;
            video.pause();
        }

        function startGame() {
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            currentQuestion = 0;
            score = 0;
            document.getElementById('current-score').innerText = score;
            loadQuestion();
            startDetection();
        }

        function restartGame() {
            document.getElementById('result-screen').classList.remove('active');
            startGame();
            video.play();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadModels();
            await startVideo();
            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', restartGame);
        });

        // Auto confirm after selection stabilizes (simple timer-based)
        let lastSelection = null;
        let selectionTimer;
        function updateSelection(yaw) {
            clearSelection();
            let newSelection = null;
            let status = '';
            if (yaw < -30) {
                newSelection = 'A';
                status = 'Nghiêng trái (A)';
            } else if (yaw >= -30 && yaw < -10) {
                newSelection = 'B';
                status = 'Nghiêng hơi trái (B)';
            } else if (yaw > 10 && yaw <= 30) {
                newSelection = 'C';
                status = 'Nghiêng hơi phải (C)';
            } else if (yaw > 30) {
                newSelection = 'D';
                status = 'Nghiêng phải (D)';
            } else {
                status = 'Giữ đầu thẳng';
            }
            document.getElementById('status').innerText = status;
            if (newSelection) {
                selectOption(newSelection);
                if (newSelection === lastSelection) {
                    if (!selectionTimer) {
                        selectionTimer = setTimeout(() => {
                            checkAnswer();
                        }, 1000); // Hold for 1s to confirm
                    }
                } else {
                    clearTimeout(selectionTimer);
                    selectionTimer = null;
                }
                lastSelection = newSelection;
            } else {
                clearTimeout(selectionTimer);
                selectionTimer = null;
                lastSelection = null;
            }
        }
    </script>
</body>
</html>
