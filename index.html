<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>GAME HÓA HỌC – ĐẠI CƯƠNG VỀ KIM LOẠI</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
font-size:38px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
cursor:pointer;
margin:10px;
}

#game{
display:none;
}

video{
border:4px solid white;
border-radius:10px;
margin-top:10px;
}

#progress{
margin-top:15px;
font-size:20px;
}

#question{
font-size:24px;
margin-top:15px;
}

.answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
width:60%;
margin:auto;
margin-top:20px;
}

.answer{
padding:20px;
border-radius:10px;
background:#34495e;
font-size:20px;
transition:0.3s;
}

.highlight{
background:#f1c40f;
}

.correct{
background:#2ecc71;
}

.wrong{
background:#e74c3c;
}

#result{
display:none;
font-size:28px;
margin-top:30px;
}

</style>
</head>

<body>

<h1>GAME HÓA HỌC – ĐẠI CƯƠNG VỀ KIM LOẠI</h1>

<div id="menu">
<button onclick="startGame()">Bắt đầu</button>
<button onclick="alert('Điều khiển bằng đầu:\nNghiêng trái = A\nNghiêng phải = B\nNgẩng đầu = C\nCúi đầu = D\nGiữ 2 giây để chọn')">Hướng dẫn</button>
</div>

<div id="game">

<video id="video" width="320" height="240" autoplay muted></video>

<div id="progress"></div>

<div id="question"></div>

<div class="answers">

<div id="A" class="answer">A</div>
<div id="B" class="answer">B</div>
<div id="C" class="answer">C</div>
<div id="D" class="answer">D</div>

</div>

</div>

<div id="result"></div>

<script>

const video = document.getElementById("video")

let detector
let score = 0
let current = 0
let selected = null
let holdStart = null

const questions=[

{q:"Kim loại có tính chất vật lí chung nào?",A:"Dẫn điện tốt",B:"Không dẫn nhiệt",C:"Không dẫn điện",D:"Tan trong nước",correct:"A"},
{q:"Tính chất hóa học đặc trưng của kim loại là:",A:"Tính oxi hóa",B:"Tính khử",C:"Tính axit",D:"Tính bazơ",correct:"B"},
{q:"Kim loại nào phản ứng mạnh với nước?",A:"Na",B:"Fe",C:"Cu",D:"Ag",correct:"A"},
{q:"Kim loại dẫn điện tốt nhất?",A:"Cu",B:"Ag",C:"Fe",D:"Al",correct:"B"},
{q:"Kim loại nhẹ nhất?",A:"Na",B:"Li",C:"K",D:"Al",correct:"B"},
{q:"Kim loại nào không phản ứng với HCl?",A:"Cu",B:"Zn",C:"Fe",D:"Al",correct:"A"},
{q:"Kim loại thường dùng làm dây điện?",A:"Fe",B:"Cu",C:"Al",D:"Zn",correct:"B"},
{q:"Thép là hợp kim của:",A:"Fe và C",B:"Cu và Zn",C:"Al và Cu",D:"Fe và Al",correct:"A"},
{q:"Đồng thau là hợp kim:",A:"Cu Zn",B:"Cu Sn",C:"Fe C",D:"Al Cu",correct:"A"},
{q:"Ăn mòn kim loại là:",A:"Phá hủy kim loại",B:"Hòa tan",C:"Đóng băng",D:"Nung nóng",correct:"A"},
{q:"Kim loại tồn tại tự do:",A:"Au",B:"Na",C:"K",D:"Ca",correct:"A"},
{q:"Kim loại lỏng ở nhiệt độ thường:",A:"Hg",B:"Fe",C:"Cu",D:"Al",correct:"A"},
{q:"Kim loại nóng chảy cao:",A:"W",B:"Na",C:"Hg",D:"K",correct:"A"},
{q:"Kim loại bị ăn mòn nhiều:",A:"Fe",B:"Ag",C:"Au",D:"Pt",correct:"A"},
{q:"Kim loại dẫn nhiệt tốt:",A:"Ag",B:"Fe",C:"Pb",D:"Zn",correct:"A"},
{q:"Kim loại mềm:",A:"Na",B:"Fe",C:"Cu",D:"Al",correct:"A"},
{q:"Phương pháp điều chế kim loại mạnh:",A:"Điện phân",B:"Nhiệt luyện",C:"Thủy luyện",D:"Kết tinh",correct:"A"},
{q:"Kim loại kiềm phản ứng mạnh với:",A:"Nước",B:"Không khí",C:"CO2",D:"N2",correct:"A"},
{q:"Kim loại dùng làm vỏ máy bay:",A:"Al",B:"Fe",C:"Cu",D:"Zn",correct:"A"},
{q:"Kim loại quý:",A:"Au",B:"Fe",C:"Na",D:"Ca",correct:"A"}

]

function startGame(){

document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="block"

loadQuestion()
initCamera()

}

function loadQuestion(){

let q=questions[current]

document.getElementById("progress").innerText="Câu "+(current+1)+" / "+questions.length
document.getElementById("question").innerText=q.q

A.innerText="A. "+q.A
B.innerText="B. "+q.B
C.innerText="C. "+q.C
D.innerText="D. "+q.D

}

async function initCamera(){

const stream=await navigator.mediaDevices.getUserMedia({video:true})
video.srcObject=stream

detector=await faceLandmarksDetection.createDetector(
faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh,
{runtime:"tfjs"}
)

detect()

}

async function detect(){

const faces=await detector.estimateFaces(video)

if(faces.length>0){

const pts=faces[0].keypoints

const nose=pts[1]
const left=pts[33]
const right=pts[263]

const eyeX=(left.x+right.x)/2
const eyeY=(left.y+right.y)/2

let dx=nose.x-eyeX
let dy=nose.y-eyeY

let choice=null

if(dx<-25) choice="A"
else if(dx>25) choice="B"
else if(dy<-20) choice="C"
else if(dy>20) choice="D"

highlight(choice)

}

requestAnimationFrame(detect)

}

function highlight(letter){

if(!letter) return

document.querySelectorAll(".answer").forEach(a=>a.classList.remove("highlight"))

document.getElementById(letter).classList.add("highlight")

if(selected!==letter){

selected=letter
holdStart=Date.now()

}else{

if(Date.now()-holdStart>2000){

checkAnswer(letter)
holdStart=Date.now()+9999

}

}

}

function checkAnswer(letter){

let q=questions[current]

if(letter===q.correct){

score+=10
document.getElementById(letter).classList.add("correct")

}else{

document.getElementById(letter).classList.add("wrong")

}

setTimeout(()=>{

current++

document.querySelectorAll(".answer").forEach(a=>{
a.classList.remove("highlight","correct","wrong")
})

if(current>=questions.length){

endGame()

}else{

loadQuestion()

}

},1200)

}

function endGame(){

document.getElementById("game").style.display="none"

let rank="Cần ôn tập"

if(score>=180) rank="Nhà hóa học"
else if(score>=140) rank="Học sinh giỏi"
else if(score>=100) rank="Khá"

document.getElementById("result").style.display="block"

document.getElementById("result").innerHTML=
"Điểm của bạn: "+score+" / 200<br><br>"+rank

}

</script>

</body>
</html>
