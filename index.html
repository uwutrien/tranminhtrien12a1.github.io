<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hóa Học - Trần Minh Triển 12A1</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --primary: #00d2ff;
            --correct: #00ff88;
            --wrong: #ff4b2b;
            --text: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 90%; max-width: 800px;
            text-align: center;
        }

        .active { display: flex; }

        h1 { font-size: 2.5rem; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; }
        .info { font-size: 1.2rem; color: #8b949e; margin-bottom: 20px; }

        .btn {
            background: var(--primary);
            color: black; border: none;
            padding: 15px 40px; font-size: 1.2rem; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            transition: 0.3s; margin-top: 20px;
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--primary); }

        /* Game UI */
        .game-header { width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; }
        
        .cam-wrapper {
            position: relative;
            width: 300px; height: 200px;
            border: 3px solid var(--primary);
            border-radius: 15px; overflow: hidden;
            background: #000;
        }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }

        .question-container {
            background: var(--card);
            padding: 20px; border-radius: 15px;
            width: 100%; margin: 20px 0;
            font-size: 1.4rem; min-height: 80px;
            border-bottom: 4px solid var(--primary);
        }

        .options {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; width: 100%;
        }

        .opt {
            background: var(--card);
            padding: 15px; border-radius: 10px;
            border: 2px solid #30363d;
            font-size: 1.1rem; position: relative;
            transition: 0.2s; text-align: left;
        }
        .opt.active-opt { border-color: gold; box-shadow: 0 0 15px gold; }
        .opt.correct { background: var(--correct); color: black; border-color: var(--correct); }
        .opt.wrong { background: var(--wrong); color: white; border-color: var(--wrong); }

        .progress-bar {
            position: absolute; bottom: 0; left: 0;
            height: 5px; background: gold; width: 0%;
            transition: width 0.1s linear;
        }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        
        .status-msg { margin-top: 15px; color: var(--primary); }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div style="font-size: 2rem;">⚡ Đang khởi tạo AI...</div>
        <div class="status-msg" id="status">Vui lòng đợi giây lát</div>
    </div>

    <div id="start-screen" class="screen active">
        <h1>GAME HÓA HỌC</h1>
        <div class="info">Học sinh: <b>Trần Minh Triển</b> - Lớp: <b>12A1</b></div>
        <div style="background: #161b22; padding: 20px; border-radius: 15px; text-align: left;">
            <p>⬅️ Nghiêng Trái: Chọn A</p>
            <p>➡️ Nghiêng Phải: Chọn B</p>
            <p>⬆️ Ngẩng Lên: Chọn C</p>
            <p>⬇️ Cúi Xuống: Chọn D</p>
            <p>⏱️ Giữ 2 giây để xác nhận đáp án.</p>
        </div>
        <button class="btn" onclick="startApp()">BẮT ĐẦU CHƠI</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <span id="q-count">Câu: 1/20</span>
            <span id="score">Điểm: 0</span>
        </div>
        
        <div class="cam-wrapper">
            <video id="input_video"></video>
            <canvas id="output_canvas"></canvas>
        </div>

        <div id="question" class="question-container">Câu hỏi sẽ hiện ở đây?</div>

        <div class="options">
            <div class="opt" id="opt-A"><span>A. </span><div class="progress-bar" id="pb-A"></div></div>
            <div class="opt" id="opt-B"><span>B. </span><div class="progress-bar" id="pb-B"></div></div>
            <div class="opt" id="opt-C"><span>C. </span><div class="progress-bar" id="pb-C"></div></div>
            <div class="opt" id="opt-D"><span>D. </span><div class="progress-bar" id="pb-D"></div></div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1>KẾT THÚC!</h1>
        <div id="final-result" style="font-size: 1.5rem; margin: 20px;"></div>
        <button class="btn" onclick="location.reload()">CHƠI LẠI</button>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status');
        const loadingOverlay = document.getElementById('loading-overlay');

        let currentIdx = 0;
        let score = 0;
        let isLocked = false;
        let holdTimer = null;
        let selectedKey = null;
        let holdValue = 0;

        const questions = [
            { q: "Kim loại nào sau đây có tính dẫn điện tốt nhất?", a: "Đồng", b: "Bạc", c: "Vàng", d: "Nhôm", ans: "B" },
            { q: "Tính chất hóa học đặc trưng của kim loại là gì?", a: "Tính khử", b: "Tính oxi hóa", c: "Tính axit", d: "Tính bazơ", ans: "A" },
            { q: "Kim loại nào có nhiệt độ nóng chảy cao nhất?", a: "Sắt", b: "Crom", c: "Vonfram", d: "Đồng", ans: "C" },
            { q: "Trong các kim loại sau, kim loại nào là kim loại kiềm?", a: "Mg", b: "Al", c: "Na", d: "Fe", ans: "C" },
            { q: "Kim loại nào sau đây phản ứng được với nước ở nhiệt độ thường?", a: "Fe", b: "Cu", c: "K", d: "Ag", ans: "C" },
            { q: "Ăn mòn điện hóa học xảy ra khi có mấy điện cực?", a: "1", b: "2", c: "3", d: "0", ans: "B" },
            { q: "Quặng Boxit là nguyên liệu để sản xuất kim loại nào?", a: "Sắt", b: "Magiê", c: "Nhôm", d: "Đồng", ans: "C" },
            { q: "Kim loại nào nhẹ nhất (khối lượng riêng nhỏ nhất)?", a: "Natri", b: "Kali", c: "Liti", d: "Nhôm", ans: "C" },
            { q: "Thành phần chính của thép là gì?", a: "Sắt và Cacbon", b: "Sắt và Đồng", c: "Đồng và Kẽm", d: "Nhôm và Magie", ans: "A" },
            { q: "Kim loại nào sau đây là kim loại dẻo nhất?", a: "Bạc", b: "Đồng", c: "Nhôm", d: "Vàng", ans: "D" },
            { q: "Dãy hoạt động hóa học nào đúng?", a: "K > Na > Mg > Al", b: "Al > Mg > Na > K", c: "Mg > Al > K > Na", d: "Na > K > Mg > Al", ans: "A" },
            { q: "Phương pháp thủy luyện dùng để điều chế kim loại nào?", a: "Kim loại mạnh", b: "Kim loại trung bình và yếu", c: "Chỉ kim loại kiềm", d: "Mọi kim loại", ans: "B" },
            { q: "Kim loại nào tan được trong dung dịch NaOH?", a: "Fe", b: "Mg", c: "Al", d: "Cu", ans: "C" },
            { q: "Hợp kim của đồng và kẽm được gọi là gì?", a: "Đồng bạch", b: "Đồng thau", c: "Thép", d: "Gang", ans: "B" },
            { q: "Hiện tượng sắt bị gỉ trong không khí ẩm là loại ăn mòn nào?", a: "Hóa học", b: "Điện hóa", c: "Vật lý", d: "Cơ học", ans: "B" },
            { q: "Kim loại nào phản ứng với axit HCl giải phóng khí H2?", a: "Cu", b: "Ag", c: "Zn", d: "Au", ans: "C" },
            { q: "Cấu hình electron lớp ngoài cùng của kim loại kiềm thổ là gì?", a: "ns1", b: "ns2", c: "ns2np1", d: "ns2np2", ans: "B" },
            { q: "Ở nhiệt độ thường, kim loại nào ở trạng thái lỏng?", a: "Thủy ngân", b: "Chì", c: "Thiếc", d: "Magiê", ans: "A" },
            { q: "Kim loại có độ cứng lớn nhất là?", a: "Sắt", b: "Crom", c: "Đồng", d: "Bạc", ans: "B" },
            { q: "Nhôm bền trong không khí và nước là do có màng gì bảo vệ?", a: "Al(OH)3", b: "Al2O3", c: "AlCl3", d: "AlPO4", ans: "B" }
        ];

        // Khởi tạo MediaPipe Face Mesh
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
            },
            width: 640,
            height: 480
        });

        // Ẩn overlay khi mọi thứ đã sẵn sàng
        window.onload = () => {
            statusText.innerText = "Hệ thống AI đã sẵn sàng!";
            setTimeout(() => loadingOverlay.style.display = 'none', 1000);
        };

        function startApp() {
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            camera.start();
            showQuestion();
        }

        function showQuestion() {
            if (currentIdx >= questions.length) {
                endGame();
                return;
            }
            isLocked = false;
            selectedKey = null;
            holdValue = 0;
            resetUI();
            
            const q = questions[currentIdx];
            document.getElementById('question').innerText = `Câu ${currentIdx+1}: ${q.q}`;
            document.getElementById('opt-A').innerHTML = `<span>A. ${q.a}</span><div class="progress-bar" id="pb-A"></div>`;
            document.getElementById('opt-B').innerHTML = `<span>B. ${q.b}</span><div class="progress-bar" id="pb-B"></div>`;
            document.getElementById('opt-C').innerHTML = `<span>C. ${q.c}</span><div class="progress-bar" id="pb-C"></div>`;
            document.getElementById('opt-D').innerHTML = `<span>D. ${q.d}</span><div class="progress-bar" id="pb-D"></div>`;
            document.getElementById('q-count').innerText = `Câu: ${currentIdx+1}/${questions.length}`;
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0 && !isLocked) {
                const landmarks = results.multiFaceLandmarks[0];
                
                // Vẽ lưới mặt cho người dùng biết AI đang hoạt động
                drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: '#00d2ff33', lineWidth: 1});

                // Logic nhận diện quay đầu
                // Điểm 1: Mũi, Điểm 234: Tai phải, Điểm 454: Tai trái (đã lật mirror)
                const nose = landmarks[1];
                const leftEye = landmarks[33]; 
                const rightEye = landmarks[263];
                const topHead = landmarks[10];
                const bottomHead = landmarks[152];

                let currentSelect = null;

                // Tính độ lệch
                const horizontal = (nose.x - leftEye.x) / (rightEye.x - leftEye.x);
                const vertical = (nose.y - topHead.y) / (bottomHead.y - topHead.y);

                if (horizontal < 0.35) currentSelect = 'A'; // Quay trái
                else if (horizontal > 0.65) currentSelect = 'B'; // Quay phải
                else if (vertical < 0.42) currentSelect = 'C'; // Ngẩng lên
                else if (vertical > 0.58) currentSelect = 'D'; // Cúi xuống

                updateSelection(currentSelect);
            }
            canvasCtx.restore();
        }

        function updateSelection(key) {
            if (key === selectedKey && key !== null) {
                holdValue += 1.5; // Tăng thanh tiến trình
                if (holdValue >= 100) {
                    confirmAnswer(key);
                }
            } else {
                selectedKey = key;
                holdValue = 0;
            }
            
            resetUI();
            if (selectedKey) {
                document.getElementById(`opt-${selectedKey}`).classList.add('active-opt');
                document.getElementById(`pb-${selectedKey}`).style.width = holdValue + '%';
            }
        }

        function resetUI() {
            ['A','B','C','D'].forEach(k => {
                document.getElementById(`opt-${k}`).classList.remove('active-opt');
                document.getElementById(`pb-${k}`).style.width = '0%';
            });
        }

        function confirmAnswer(key) {
            isLocked = true;
            const correctAns = questions[currentIdx].ans;
            const optEl = document.getElementById(`opt-${key}`);
            
            if (key === correctAns) {
                optEl.classList.add('correct');
                score += 10;
            } else {
                optEl.classList.add('wrong');
                document.getElementById(`opt-${correctAns}`).classList.add('correct');
            }
            
            document.getElementById('score').innerText = `Điểm: ${score}`;

            setTimeout(() => {
                currentIdx++;
                showQuestion();
            }, 2000);
        }

        function endGame() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            
            let rank = "";
            if(score >= 180) rank = "NHÀ HÓA HỌC XUẤT SẮC 🏆";
            else if(score >= 140) rank = "HỌC SINH GIỎI 🥇";
            else if(score >= 100) rank = "KHÁ 👍";
            else rank = "CẦN ÔN TẬP THÊM 📚";

            document.getElementById('final-result').innerHTML = `
                
                Điểm số: ${score}/200<br>
                Xếp loại: ${rank}
            `;
            camera.stop();
        }
    </script>
</body>
</html>
