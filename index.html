<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hóa 12 - Đại Cương Kim Loại</title>
    <!-- Import face-api.js từ CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        /* --- CSS Styles --- */
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --bg-color: #1e272e;
            --card-bg: #2f3640;
            --text-color: #f5f6fa;
            --success: #00b894;
            --error: #d63031;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Camera Container */
        #camera-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border: 2px solid var(--secondary-color);
            border-radius: 10px;
            overflow: hidden;
            z-index: 100;
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.5);
            background: #000;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Lật gương mặt cho tự nhiên */
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .face-status {
            position: fixed;
            bottom: 150px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #fff;
            z-index: 101;
        }

        /* Main Container */
        .game-container {
            width: 90%;
            max-width: 600px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            margin-bottom: 10px;
            color: var(--secondary-color);
            font-size: 1.5rem;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #dcdde1;
        }

        /* Question Section */
        .question-box {
            font-size: 1.2rem;
            margin-bottom: 25px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background-color: #353b48;
            border: 2px solid #4b4b4b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            background-color: #4834d4;
        }

        .option-btn.active {
            background-color: var(--primary-color);
            border-color: var(--secondary-color);
            box-shadow: 0 0 15px var(--primary-color);
            transform: scale(1.02);
        }

        .option-btn.correct {
            background-color: var(--success) !important;
            border-color: #55efc4 !important;
        }

        .option-btn.wrong {
            background-color: var(--error) !important;
            border-color: #ff7675 !important;
        }

        /* Loading Screen */
        #loading-screen {
            position: absolute;
            top: 0;
            left
