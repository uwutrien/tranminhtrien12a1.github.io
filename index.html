<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAME HÓA HỌC – KIM LOẠI</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#1f4037,#99f2c8);
text-align:center;
color:white;
}

h1{
margin-top:15px;
font-size:30px;
text-shadow:0 2px 5px rgba(0,0,0,0.3);
}

button{
padding:14px 28px;
font-size:18px;
border:none;
border-radius:12px;
background:#ff7675;
color:white;
cursor:pointer;
margin:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

button:hover{
transform:scale(1.05);
}

#game{
display:none;
}

.camera-box{
position:relative;
width:320px;
margin:auto;
}

video{
width:100%;
border-radius:15px;
border:4px solid white;
}

canvas{
position:absolute;
left:0;
top:0;
}

#question{
font-size:22px;
margin-top:15px;
padding:10px;
}

.answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
width:90%;
max-width:500px;
margin:auto;
margin-top:10px;
}

.answer{
background:#2c3e50;
padding:15px;
border-radius:12px;
font-size:18px;
transition:0.3s;
}

.highlight{
background:#f1c40f;
transform:scale(1.05);
}

.correct{
background:#2ecc71;
}

.wrong{
background:#e74c3c;
}

#progress{
margin-top:10px;
font-size:18px;
}

#result{
display:none;
font-size:26px;
margin-top:30px;
}

@media (max-width:600px){

h1{font-size:22px}
.answer{font-size:16px}

}

</style>
</head>

<body>

<h1>🎮 GAME HÓA HỌC – ĐẠI CƯƠNG KIM LOẠI</h1>

<div id="menu">
<button onclick="startGame()">Bắt đầu</button>
<button onclick="alert('Nghiêng trái = A\nNghiêng phải = B\nNgẩng đầu = C\nCúi đầu = D\nGiữ 2 giây để chọn')">
Hướng dẫn
</button>
</div>

<div id="game">

<div class="camera-box">
<video id="video" autoplay muted playsinline></video>
<canvas id="canvas"></canvas>
</div>

<div id="progress"></div>
<div id="question"></div>

<div class="answers">

<div id="A" class="answer">A</div>
<div id="B" class="answer">B</div>
<div id="C" class="answer">C</div>
<div id="D" class="answer">D</div>

</div>

</div>

<div id="result"></div>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let detector
let score=0
let current=0
let selected=null
let holdStart=null

const questions=[

{q:"Kim loại có tính chất vật lí chung nào?",A:"Dẫn điện tốt",B:"Không dẫn nhiệt",C:"Không dẫn điện",D:"Tan trong nước",correct:"A"},
{q:"Tính chất hóa học đặc trưng của kim loại là:",A:"Tính oxi hóa",B:"Tính khử",C:"Tính axit",D:"Tính bazơ",correct:"B"},
{q:"Kim loại phản ứng mạnh với nước?",A:"Na",B:"Fe",C:"Cu",D:"Ag",correct:"A"},
{q:"Kim loại dẫn điện tốt nhất?",A:"Cu",B:"Ag",C:"Fe",D:"Al",correct:"B"},
{q:"Kim loại nhẹ nhất?",A:"Li",B:"Na",C:"Fe",D:"Cu",correct:"A"},
{q:"Thép là hợp kim:",A:"Fe + C",B:"Cu + Zn",C:"Al + Cu",D:"Fe + Al",correct:"A"},
{q:"Kim loại lỏng ở nhiệt độ thường:",A:"Hg",B:"Fe",C:"Cu",D:"Al",correct:"A"},
{q:"Kim loại tồn tại tự do:",A:"Au",B:"Na",C:"K",D:"Ca",correct:"A"},
{q:"Kim loại dùng làm dây điện:",A:"Cu",B:"Fe",C:"Zn",D:"Pb",correct:"A"},
{q:"Kim loại nóng chảy cao:",A:"W",B:"Na",C:"K",D:"Hg",correct:"A"}

]

function startGame(){

menu.style.display="none"
game.style.display="block"

loadQuestion()
initCamera()

}

function loadQuestion(){

let q=questions[current]

progress.innerText="Câu "+(current+1)+" / "+questions.length
question.innerText=q.q

A.innerText="A. "+q.A
B.innerText="B. "+q.B
C.innerText="C. "+q.C
D.innerText="D. "+q.D

}

async function initCamera(){

const stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"}
})

video.srcObject=stream

await video.play()

canvas.width=video.videoWidth
canvas.height=video.videoHeight

detector=await faceLandmarksDetection.createDetector(
faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh,
{runtime:"tfjs"}
)

detect()

}

async function detect(){

ctx.clearRect(0,0,canvas.width,canvas.height)

const faces=await detector.estimateFaces(video)

if(faces.length>0){

const face=faces[0]

const pts=face.keypoints

const nose=pts[1]
const left=pts[33]
const right=pts[263]

/* vẽ khung mặt */

const box=face.box

ctx.strokeStyle="#00ffcc"
ctx.lineWidth=3
ctx.strokeRect(box.xMin,box.yMin,box.width,box.height)

/* tính góc đầu */

let eyeX=(left.x+right.x)/2
let eyeY=(left.y+right.y)/2

let dx=nose.x-eyeX
let dy=nose.y-eyeY

let choice=null

if(dx<-25) choice="A"
else if(dx>25) choice="B"
else if(dy<-20) choice="C"
else if(dy>20) choice="D"

highlight(choice)

}

requestAnimationFrame(detect)

}

function highlight(letter){

if(!letter)return

document.querySelectorAll(".answer")
.forEach(a=>a.classList.remove("highlight"))

document.getElementById(letter)
.classList.add("highlight")

if(selected!==letter){

selected=letter
holdStart=Date.now()

}else{

if(Date.now()-holdStart>2000){

checkAnswer(letter)
holdStart=Date.now()+9999

}

}

}

function checkAnswer(letter){

let q=questions[current]

if(letter===q.correct){

score+=10
document.getElementById(letter).classList.add("correct")

}else{

document.getElementById(letter).classList.add("wrong")

}

setTimeout(()=>{

current++

document.querySelectorAll(".answer")
.forEach(a=>a.classList.remove("highlight","correct","wrong"))

if(current>=questions.length){

endGame()

}else{

loadQuestion()

}

},1200)

}

function endGame(){

game.style.display="none"

let rank="Cần ôn tập"

if(score>=90) rank="Nhà hóa học"
else if(score>=70) rank="Học sinh giỏi"
else if(score>=50) rank="Khá"

result.style.display="block"

result.innerHTML=
"🎉 Điểm của bạn: "+score+"<br><br>"+rank

}

</script>

</body>
</html>
